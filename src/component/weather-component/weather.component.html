<div class="weather">
    <div class="weather__sun-clouds">

        <img class="weather__sun" src="./sun.svg" alt="Дышащее облако" width="30">
        <div class="weather__clouds" #clouds></div>
    </div>

    <!--    <div class="mini-cloud"></div>-->
    <div class="weather__temperature">
        <div #temperature></div>
        <div>&deg;C</div>
    </div>
    <div class="weather__wind">
        <div class="weather__wind-direction" #windDirection>&uarr;</div>
        <div #wind></div>
        <div>m/s</div>

    </div>
</div>
